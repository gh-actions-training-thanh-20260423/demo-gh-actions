name: Demo Github Actions Events
run-name: Demo GitHub Actions Events

on:
  # Webhook events
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches: [main]
  issues:
    types: 
      - opened
      - closed
  
  # Scheduled events
  schedule:
    - cron: 0 9 * * *
    - cron: 0 12 * * 0

  # Manual events
  workflow_dispatch: 

jobs:
  Greeting:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: echo "Good morning"
